name: yu_ni_player_tx_player
description: TXPlayerEngine for YuNiPlayer — based on Tencent super_player SDK. Supports iOS and Android with hardware acceleration and license-based playback.
version: 1.0.0
repository: https://github.com/lurongshuang/yu_ni_player/tree/main/packages/yu_ni_player_tx_player
issue_tracker: https://github.com/lurongshuang/yu_ni_player/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  yu_ni_player:
    path: ../yu_ni_player
  super_player: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

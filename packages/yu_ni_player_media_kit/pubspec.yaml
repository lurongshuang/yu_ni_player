name: yu_ni_player_media_kit
description: MediaKitEngine for YuNiPlayer — based on media_kit (cross-platform, open source). Supports Android, iOS, macOS, Windows, Linux, Web.
version: 1.0.0
repository: https://github.com/lurongshuang/yu_ni_player/tree/main/packages/yu_ni_player_media_kit
issue_tracker: https://github.com/lurongshuang/yu_ni_player/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  yu_ni_player:
    path: ../yu_ni_player
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

name: yu_ni_player
description: A unified Flutter video player plugin with multi-engine support (video_player, TXPlayer, media_kit). Single API, LRU pool, fullscreen, custom controls.
version: 1.0.0
homepage: https://github.com/lurongshuang/yu_ni_player
repository: https://github.com/lurongshuang/yu_ni_player
issue_tracker: https://github.com/lurongshuang/yu_ni_player/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # ── VideoPlayerKitEngine（iOS / Android / macOS / Windows / Web）──
  video_player: ^2.9.2

  # ── TXPlayerEngine（iOS / Android，腾讯超级播放器）────────────────
  super_player: ^13.7.0

  # ── MediaKitEngine（全平台，开源）────────────────────────────────
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  glados: ^1.1.7

flutter:
  uses-material-design: true

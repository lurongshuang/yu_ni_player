name: yu_ni_player_example
description: Example app for YuNiPlayer — demonstrates all engines and features.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  yu_ni_player:
    path: ../packages/yu_ni_player
  yu_ni_player_video_player_kit:
    path: ../packages/yu_ni_player_video_player_kit
  yu_ni_player_tx_player:
    path: ../packages/yu_ni_player_tx_player
  yu_ni_player_media_kit:
    path: ../packages/yu_ni_player_media_kit
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
